services:
  # The Graph Memory (Relational logic, "Biological" connections)
  neo4j:
    image: neo4j:latest
    container_name: helix_graph
    ports:
      - "7474:7474" # Web Browser Interface
      - "7687:7687" # Bolt Protocol (for Python to talk to it)
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - ./data/neo4j:/data

  # The Vector Memory (Semantic search, RAG logic)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: helix_vector
    ports:
      - "6333:6333" # API Port
      - "6334:6334" # gRPC Port
    volumes:
      - ./data/qdrant:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: helix_api
    env_file: .env
    environment:
      - NEO4J_URI=bolt://helix_graph:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - QDRANT_HOST=helix_vector
      - QDRANT_PORT=6333
    depends_on:
      - neo4j
      - qdrant
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: helix_frontend
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
